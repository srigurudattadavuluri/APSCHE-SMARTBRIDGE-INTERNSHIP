<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:80%;
            margin:auto;
            background:white;
            padding:20px;
            margin-top:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
            color:#333;
        }

        .row{
            display:flex;
            gap:20px;
            margin-bottom:15px;
        }

        .field{
            flex:1;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:10px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            text-align:center;
            font-size:25px;
            margin-top:20px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Credit Card Approval Prediction</h1>

<form action="/predict" method="POST">

<div class="row">

<div class="field">
<label>Gender</label>
<select name="gender">
<option value="M">Male</option>
<option value="F">Female</option>
</select>
</div>

<div class="field">
<label>Own Car</label>
<select name="own_car">
<option value="Y">Yes</option>
<option value="N">No</option>
</select>
</div>

<div class="field">
<label>Own Realty</label>
<select name="own_realty">
<option value="Y">Yes</option>
<option value="N">No</option>
</select>
</div>

</div>

<div class="row">

<div class="field">
<label>Income Type</label>
<select name="income_type">
<option value="Working">Working</option>
<option value="Commercial associate">Commercial Associate</option>
<option value="Pensioner">Pensioner</option>
<option value="State servant">State Servant</option>
<option value="Student">Student</option>
</select>
</div>

<div class="field">
<label>Education</label>
<select name="education">
<option value="Higher education">Higher Education</option>
<option value="Secondary / secondary special">Secondary</option>
<option value="Incomplete higher">Incomplete Higher</option>
<option value="Lower secondary">Lower Secondary</option>
<option value="Academic degree">Academic Degree</option>
</select>
</div>

<div class="field">
<label>Family Status</label>
<select name="family_status">
<option value="Married">Married</option>
<option value="Single / not married">Single</option>
<option value="Civil marriage">Civil Marriage</option>
<option value="Separated">Separated</option>
<option value="Widow">Widow</option>
</select>
</div>

</div>

<div class="row">

<div class="field">
<label>Housing Type</label>
<select name="housing_type">
<option value="House / apartment">House / Apartment</option>
<option value="Co-op apartment">Co-op Apartment</option>
<option value="Municipal apartment">Municipal Apartment</option>
<option value="Office apartment">Office Apartment</option>
<option value="Rented apartment">Rented Apartment</option>
<option value="With parents">With Parents</option>
</select>
</div>

<div class="field">
<label>Children</label>
<input type="number" name="cnt_children" required>
</div>

<div class="field">
<label>Annual Income</label>
<input type="number" name="income" required>
</div>

</div>

<div class="row">

<div class="field">
<label>Work Phone</label>
<input type="number" name="work_phone" required>
</div>

<div class="field">
<label>Phone</label>
<input type="number" name="phone" required>
</div>

<div class="field">
<label>Email</label>
<input type="number" name="email" required>
</div>

</div>

<div class="row">

<div class="field">
<label>Family Members</label>
<input type="number" name="family_members" required>
</div>

<div class="field">
<label>First Month</label>
<input type="number" step="any" name="first_month" required>
</div>

<div class="field">
<label>Age (Years)</label>
<input type="number" step="any" name="age_years" required>
</div>

</div>

<div class="row">

<div class="field">
<label>Years Employed</label>
<input type="number" step="any" name="years_employed" required>
</div>

</div>

<button type="submit">
Predict
</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
