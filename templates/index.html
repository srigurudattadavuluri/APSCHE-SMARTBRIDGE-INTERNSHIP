<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            max-width: 900px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .header {
            background: var(--primary-color);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #bfdbfe;
            font-size: 15px;
        }

        form {
            padding: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 8px;
            grid-column: 1 / -1;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            background-color: #f9fafb;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            grid-column: 1 / -1;
            background-color: var(--primary-color);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .result-container {
            padding: 0 30px 30px 30px;
        }

        .result-box {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 700;
            background-color: #f0fdf4;
            color: #166534;
            border: 2px solid #bbf7d0;
        }

        /* Responsive Design for Mobile */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Credit Card Approval Predictor</h1>
            <p>Enter applicant details to evaluate credit risk using Machine Learning</p>
        </div>

        <form action="/predict" method="POST">
            
            <div class="form-grid">
                <h3 class="section-title">Personal Information</h3>
                
                <div class="field">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>

                <div class="field">
                    <label>Age (Years)</label>
                    <input type="number" step="any" name="age_years" placeholder="e.g. 35" required>
                </div>

                <div class="field">
                    <label>Family Status</label>
                    <select name="family_status" required>
                        <option value="" disabled selected>Select Status</option>
                        <option value="Married">Married</option>
                        <option value="Single / not married">Single / Not Married</option>
                        <option value="Civil marriage">Civil Marriage</option>
                        <option value="Separated">Separated</option>
                        <option value="Widow">Widow</option>
                    </select>
                </div>

                <div class="field">
                    <label>Number of Children</label>
                    <input type="number" name="cnt_children" placeholder="e.g. 0" required>
                </div>

                <div class="field">
                    <label>Total Family Members</label>
                    <input type="number" name="family_members" placeholder="e.g. 2" required>
                </div>
            </div>

            <div class="form-grid">
                <h3 class="section-title">Employment & Finances</h3>
                
                <div class="field">
                    <label>Annual Income ($)</label>
                    <input type="number" step="any" name="income" placeholder="e.g. 45000" required>
                </div>

                <div class="field">
                    <label>Income Type</label>
                    <select name="income_type" required>
                        <option value="" disabled selected>Select Type</option>
                        <option value="Working">Working</option>
                        <option value="Commercial associate">Commercial Associate</option>
                        <option value="Pensioner">Pensioner</option>
                        <option value="State servant">State Servant</option>
                        <option value="Student">Student</option>
                    </select>
                </div>

                <div class="field">
                    <label>Education Level</label>
                    <select name="education" required>
                        <option value="" disabled selected>Select Education</option>
                        <option value="Higher education">Higher Education</option>
                        <option value="Secondary / secondary special">Secondary / Special</option>
                        <option value="Incomplete higher">Incomplete Higher</option>
                        <option value="Lower secondary">Lower Secondary</option>
                        <option value="Academic degree">Academic Degree</option>
                    </select>
                </div>

                <div class="field">
                    <label>Years Employed</label>
                    <input type="number" step="any" name="years_employed" placeholder="e.g. 5.5" required>
                </div>
            </div>

            <div class="form-grid">
                <h3 class="section-title">Assets & History</h3>

                <div class="field">
                    <label>Housing Type</label>
                    <select name="housing_type" required>
                        <option value="" disabled selected>Select Housing</option>
                        <option value="House / apartment">House / Apartment</option>
                        <option value="Rented apartment">Rented Apartment</option>
                        <option value="With parents">With Parents</option>
                        <option value="Municipal apartment">Municipal Apartment</option>
                        <option value="Co-op apartment">Co-op Apartment</option>
                        <option value="Office apartment">Office Apartment</option>
                    </select>
                </div>

                <div class="field">
                    <label>Credit History (First Month)</label>
                    <input type="number" step="any" name="first_month" placeholder="Months since first loan" required>
                </div>

                <div class="field">
                    <label>Own Car</label>
                    <select name="own_car" required>
                        <option value="Y">Yes</option>
                        <option value="N">No</option>
                    </select>
                </div>

                <div class="field">
                    <label>Own Real Estate</label>
                    <select name="own_realty" required>
                        <option value="Y">Yes</option>
                        <option value="N">No</option>
                    </select>
                </div>

                <div class="field">
                    <label>Has Work Phone?</label>
                    <select name="work_phone" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="field">
                    <label>Has Mobile Phone?</label>
                    <select name="phone" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="field">
                    <label>Has Email?</label>
                    <select name="email" required>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn">Evaluate Application</button>
            </div>
        </form>

        {% if prediction_text %}
        <div class="result-container">
            <div class="result-box" style="
                {% if 'Rejected' in prediction_text %} 
                    background-color: #fef2f2; color: #991b1b; border-color: #fecaca; 
                {% endif %}">
                Result: {{ prediction_text }}
            </div>
        </div>
        {% endif %}

    </div>

</body>
</html>
